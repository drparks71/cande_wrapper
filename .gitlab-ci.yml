    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# --- STAGE 2: BUILD (on tags only) ---
.build_linux_wheel:
  stage: build
  tags:
    - docker
  image: quay.io/pypa/manylinux2014_x86_64
  script:
    - yum install -y gcc-gfortran
    - PYTHON="/opt/python/${PYTHON_TAG}/bin/python"
    - $PYTHON -m pip install "numpy>=1.26" meson meson-python ninja build
    - $PYTHON -m build --wheel --outdir wheelhouse/
    - auditwheel repair wheelhouse/*.whl -w dist/
  artifacts:
    paths:
      - dist/*.whl
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_PIPELINE_SOURCE == "web"

build_linux_cp310:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp310-cp310"

build_linux_cp311:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp311-cp311"

build_linux_cp312:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp312-cp312"

build_linux_cp313:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp313-cp313"

# Build Windows wheels using a matrix
build_windows:
  stage: build
  tags:
    - windows
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13"]
  script:
    # Locate Python by install path (e.g. C:\Python310\python.exe)
    - $PY_SHORT = "$PYTHON_VERSION" -replace '\.', ''
    - $PYTHON = "C:\Python" + $PY_SHORT + "\python.exe"
    - '& $PYTHON -m pip install "numpy>=1.26" meson meson-python ninja build delvewheel'
    - '& $PYTHON -m build --wheel --outdir wheelhouse/'
    - $wheel = Get-ChildItem wheelhouse\*.whl | Select-Object -First 1
    - '& $PYTHON -m delvewheel repair $wheel.FullName -w dist/'
  artifacts:
    paths:
      - dist/*.whl
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_PIPELINE_SOURCE == "web"

# Build source distribution (needs gfortran for meson setup)
build_sdist:
  stage: build
  tags:
    - docker
  image: quay.io/pypa/manylinux2014_x86_64
  script:
    - yum install -y gcc-gfortran
    - /opt/python/cp310-cp310/bin/python -m pip install build meson-python meson ninja numpy
    - /opt/python/cp310-cp310/bin/python -m build --sdist --outdir dist/
  artifacts:
    paths:
      - dist/*.tar.gz
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_PIPELINE_SOURCE == "web"

# --- STAGE 3: PUBLISH (on version tags only) ---
publish_pypi:
  stage: publish
  tags:
    - docker
  image: python:3.10
  needs:
    - build_linux_cp310
    - build_linux_cp311
    - build_linux_cp312
    - build_linux_cp313
    - build_windows
    - build_sdist
  script:
    - pip install twine
    - twine upload dist/*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

# --- STAGE 4: DEPLOY DOCS ---
pages:
  stage: deploy
  image: python:3.11
  script:
    - pip install -r docs/requirements.txt
    - PYTHONPATH=src python -m sphinx docs public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
