stages:
  - build
  - publish

# 1. Build a pure Python dummy wheel and sdist
build_dummy:
  stage: build
  image: python:3.10
  script:
    - pip install build
    - python -m build --sdist --wheel --outdir dist/
  artifacts:
    paths:
      - dist/*

# 2. Publish to PyPI
publish_pypi:
  stage: publish
  image: python:3.10
  needs:
    - build_dummy
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pip install twine
    - twine upload dist/*