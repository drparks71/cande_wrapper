stages:
  - test
  - build
  - publish
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip_cache"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .pip_cache/

# --- TEST TEMPLATE ---
.test_logic:
  script:
    - pip install --upgrade setuptools pip
    - pip install pytest pytest-cov numpy
    - PYTHONPATH=src python -m pytest --cov=cande_wrapper --cov-report term --cov-report xml:coverage.xml -m "not integration"
  coverage: '/TOTAL.*\s+(\d+\%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

# --- STAGE 1: TEST ---
smoke-test-3.11:
  extends: .test_logic
  stage: test
  image: python:3.11
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: never
    - if: $CI_COMMIT_TITLE =~ /-no_tests/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

verify-3.10:
  extends: .test_logic
  stage: test
  image: python:3.10
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: never
    - if: $CI_COMMIT_TITLE =~ /-no_tests/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

verify-3.12:
  extends: .test_logic
  stage: test
  image: python:3.12
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
