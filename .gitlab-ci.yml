stages:
  - build
  - publish

# Build Linux wheels directly in manylinux containers
.build_linux_wheel:
  stage: build
  image: quay.io/pypa/manylinux2014_x86_64
  script:
    - yum install -y gcc-gfortran
    - PYTHON="/opt/python/${PYTHON_TAG}/bin/python"
    - $PYTHON -m pip install "numpy>=1.26" meson meson-python ninja build
    - $PYTHON -m build --wheel --outdir wheelhouse/
    - auditwheel repair wheelhouse/*.whl -w dist/
  artifacts:
    paths:
      - dist/*.whl

build_linux_cp310:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp310-cp310"

build_linux_cp311:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp311-cp311"

build_linux_cp312:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp312-cp312"

build_linux_cp313:
  extends: .build_linux_wheel
  variables:
    PYTHON_TAG: "cp313-cp313"

# Build Windows wheel on the local runner
build_windows:
  stage: build
  tags:
    - windows
  script:
    - pip install "numpy>=1.26" meson meson-python ninja build delvewheel
    - python -m build --wheel --outdir wheelhouse/
    - $wheel = Get-ChildItem wheelhouse\*.whl | Select-Object -First 1
    - delvewheel repair $wheel.FullName -w dist/
  artifacts:
    paths:
      - dist/*.whl

# Build source distribution (needs gfortran for meson setup)
build_sdist:
  stage: build
  image: quay.io/pypa/manylinux2014_x86_64
  script:
    - yum install -y gcc-gfortran
    - /opt/python/cp310-cp310/bin/python -m pip install build meson-python meson ninja numpy
    - /opt/python/cp310-cp310/bin/python -m build --sdist --outdir dist/
  artifacts:
    paths:
      - dist/*.tar.gz

# Publish to PyPI on tagged releases
publish_pypi:
  stage: publish
  image: python:3.10
  needs:
    - build_linux_cp310
    - build_linux_cp311
    - build_linux_cp312
    - build_linux_cp313
    - build_windows
    - build_sdist
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pip install twine
    - twine upload dist/*
